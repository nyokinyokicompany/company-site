name: 新着情報を自動更新

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: サイトを取得
        uses: actions/checkout@v4
      - name: Node.jsを準備
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 新着情報を確認
        run: npm run update:news
      - name: 変更があれば保存
        run: |
          if git diff --quiet -- app/news-data.json; then
            echo "新しい投稿はありません"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/news-data.json
          git commit -m "新着情報を自動更新"
          git push
